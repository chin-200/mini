<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ConcertHub</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0a0a0f; color: #eee; min-height: 100vh; }
  .hidden { display: none !important; }

  nav { background: #111; padding: 14px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
  nav h1 { color: #f0a500; font-size: 1.4rem; letter-spacing: 2px; }
  nav div { display: flex; gap: 10px; align-items: center; }
  nav button { background: none; border: 1px solid #444; color: #ccc; padding: 6px 14px; border-radius: 6px; cursor: pointer; }
  nav button:hover { border-color: #f0a500; color: #f0a500; }
  #userInfo { color: #aaa; font-size: 0.85rem; }

  .page { padding: 30px 24px; max-width: 900px; margin: 0 auto; }

  .card { background: #161620; border: 1px solid #252535; border-radius: 12px; padding: 30px; max-width: 400px; margin: 60px auto; }
  .card h2 { margin-bottom: 20px; color: #f0a500; }
  input { width: 100%; padding: 10px 14px; margin: 8px 0; background: #0d0d16; border: 1px solid #333; border-radius: 8px; color: #eee; font-size: 0.95rem; }
  input:focus { outline: none; border-color: #f0a500; }
  .btn { width: 100%; padding: 11px; background: #f0a500; color: #000; border: none; border-radius: 8px; font-weight: 700; font-size: 1rem; cursor: pointer; margin-top: 10px; }
  .btn:hover { background: #ffbe33; }
  .link { color: #f0a500; cursor: pointer; font-size: 0.85rem; display: block; text-align: center; margin-top: 12px; }
  .err { color: #ff4466; font-size: 0.82rem; margin-top: 6px; }
  .ok { color: #4caf50; font-size: 0.9rem; margin-top: 8px; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; margin-top: 20px; }
  .concert-card { background: #161620; border: 1px solid #252535; border-radius: 12px; padding: 20px; }
  .concert-card h3 { color: #f0a500; font-size: 1.1rem; }
  .concert-card p { font-size: 0.82rem; color: #999; margin: 4px 0; }
  .badge { display: inline-block; background: #e03; color: #fff; font-size: 0.75rem; padding: 3px 10px; border-radius: 20px; font-weight: 700; margin-top: 10px; }
  .btn-sm { padding: 8px 18px; background: #f0a500; color: #000; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 0.9rem; margin-top: 10px; width: 100%; }
  .btn-sm:hover { background: #ffbe33; }

  #detailCard { max-width: 500px; margin: 40px auto; }
  #detailCard h2 { color: #f0a500; margin-bottom: 12px; }
  #detailCard p { margin: 6px 0; color: #bbb; }

  .admin-form { background: #161620; border: 1px solid #252535; border-radius: 12px; padding: 24px; margin-bottom: 30px; }
  .admin-form h3 { color: #f0a500; margin-bottom: 14px; }
  table { width: 100%; border-collapse: collapse; margin-top: 10px; }
  th, td { text-align: left; padding: 10px 12px; font-size: 0.85rem; border-bottom: 1px solid #222; }
  th { color: #f0a500; }
  td button { background: none; border: 1px solid #e03; color: #e03; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
  td button:hover { opacity: 0.8; }

  h2.page-title { color: #f0a500; margin-bottom: 10px; }
</style>
</head>
<body>

<nav>
  <h1>🎵 ConcertHub</h1>
  <div>
    <span id="userInfo" class="hidden"></span>
    <button onclick="showPage('main')">Home</button>
    <button id="navAdmin" class="hidden" onclick="showPage('admin')">Admin</button>
    <button id="navLogout" class="hidden" onclick="logout()">Logout</button>
  </div>
</nav>

<!-- AUTH -->
<div id="authPage" class="page">
  <div id="loginBox" class="card">
    <h2>Login</h2>
    <input id="loginUser" placeholder="Username">
    <input id="loginPass" placeholder="Password" type="password">
    <div id="loginErr" class="err"></div>
    <button class="btn" onclick="login()">Login</button>
    <span class="link" onclick="toggle('loginBox','registerBox')">No account? Register</span>
  </div>
  <div id="registerBox" class="card hidden">
    <h2>Register</h2>
    <input id="regUser" placeholder="Username (min 6 chars, 1 number)">
    <input id="regPass" placeholder="Password">
    <div id="regErr" class="err"></div>
    <button class="btn" onclick="register()">Register</button>
    <span class="link" onclick="toggle('registerBox','loginBox')">Have an account? Login</span>
  </div>
</div>

<!-- MAIN -->
<div id="mainPage" class="page hidden">
  <h2 class="page-title">Upcoming Concerts</h2>
  <div id="concertGrid" class="grid"></div>
</div>

<!-- DETAIL -->
<div id="detailPage" class="page hidden">
  <button onclick="showPage('main')" style="background:none;border:1px solid #444;color:#aaa;padding:7px 16px;border-radius:8px;cursor:pointer;margin-bottom:16px;">← Back</button>
  <div class="concert-card" id="detailCard"></div>
</div>

<!-- ADMIN -->
<div id="adminPage" class="page hidden">
  <h2 class="page-title">Admin Panel</h2>
  <div class="admin-form">
    <h3>Add Concert</h3>
    <input id="aArtist" placeholder="Artist Name">
    <input id="aDate" type="date">
    <input id="aLocation" placeholder="Location">
    <input id="aPrice" placeholder="Ticket Price" type="number">
    <input id="aTickets" placeholder="Available Tickets" type="number">
    <div id="adminErr" class="err"></div>
    <button class="btn" onclick="addConcert()">Add Concert</button>
  </div>
  <h3 style="color:#f0a500;margin-bottom:10px;">All Concerts</h3>
  <table>
    <thead><tr><th>Artist</th><th>Date</th><th>Location</th><th>Tickets</th><th>Action</th></tr></thead>
    <tbody id="adminTable"></tbody>
  </table>
</div>

<script>
let users = JSON.parse(localStorage.getItem('ch_users') || '[]');
let concerts = JSON.parse(localStorage.getItem('ch_concerts') || JSON.stringify([
  { id:1, artist:"The Weeknd", date:"2026-07-15", location:"Mumbai", price:2500, tickets:5 },
  { id:2, artist:"Dua Lipa", date:"2026-08-10", location:"Delhi", price:3200, tickets:0 },
  { id:3, artist:"A.R. Rahman", date:"2026-09-01", location:"Chennai", price:1500, tickets:20 }
]));
let currentUser = JSON.parse(sessionStorage.getItem('ch_user') || 'null');

function save() {
  localStorage.setItem('ch_users', JSON.stringify(users));
  localStorage.setItem('ch_concerts', JSON.stringify(concerts));
}

function register() {
  const u = document.getElementById('regUser').value.trim();
  const p = document.getElementById('regPass').value;
  const err = document.getElementById('regErr');
  if (u.length < 6 || !/\d/.test(u)) { err.textContent = "Username: 6+ chars, at least 1 number."; return; }
  if (!p) { err.textContent = "Password required."; return; }
  if (users.find(x => x.u === u)) { err.textContent = "Username taken."; return; }
  users.push({ u, p, role: 'user' }); save();
  err.style.color = '#4caf50'; err.textContent = "Registered! Please login.";
  setTimeout(() => toggle('registerBox', 'loginBox'), 1000);
}

function login() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  const err = document.getElementById('loginErr');
  if (u === 'admin' && p === 'admin123') {
    currentUser = { u: 'admin', role: 'admin' };
    sessionStorage.setItem('ch_user', JSON.stringify(currentUser));
    afterLogin(); return;
  }
  const found = users.find(x => x.u === u && x.p === p);
  if (!found) { err.textContent = "Invalid credentials."; return; }
  currentUser = found;
  sessionStorage.setItem('ch_user', JSON.stringify(currentUser));
  afterLogin();
}

function afterLogin() {
  document.getElementById('userInfo').textContent = '👤 ' + currentUser.u;
  document.getElementById('userInfo').classList.remove('hidden');
  document.getElementById('navLogout').classList.remove('hidden');
  if (currentUser.role === 'admin') document.getElementById('navAdmin').classList.remove('hidden');
  showPage('main');
}

function logout() {
  currentUser = null; sessionStorage.clear();
  ['userInfo','navLogout','navAdmin'].forEach(id => document.getElementById(id).classList.add('hidden'));
  showPage('auth');
}

function showPage(p) {
  ['authPage','mainPage','detailPage','adminPage'].forEach(id => document.getElementById(id).classList.add('hidden'));
  if (p === 'auth') document.getElementById('authPage').classList.remove('hidden');
  else if (p === 'main') { document.getElementById('mainPage').classList.remove('hidden'); renderConcerts(); }
  else if (p === 'detail') document.getElementById('detailPage').classList.remove('hidden');
  else if (p === 'admin') { document.getElementById('adminPage').classList.remove('hidden'); renderAdmin(); }
}

function toggle(hide, show) {
  document.getElementById(hide).classList.add('hidden');
  document.getElementById(show).classList.remove('hidden');
}

function renderConcerts() {
  document.getElementById('concertGrid').innerHTML = concerts.map(c => `
    <div class="concert-card">
      <h3>${c.artist}</h3>
      <p>📅 ${c.date}</p>
      <p>📍 ${c.location}</p>
      <p>🎟 $${c.price} &nbsp; Available: ${c.tickets}</p>
      ${c.tickets > 0
        ? `<button class="btn-sm" onclick="openDetail(${c.id})">Book Tickets</button>`
        : `<span class="badge">SOLD OUT</span>`}
    </div>`).join('');
}

function openDetail(id) {
  if (!currentUser) { showPage('auth'); return; }
  const c = concerts.find(x => x.id === id);
  document.getElementById('detailCard').innerHTML = `
    <h2>${c.artist}</h2>
    <p>📅 ${c.date} &nbsp; 📍 ${c.location}</p>
    <p>🎟 Price: $${c.price} &nbsp; Available: <b>${c.tickets}</b></p>
    <div id="bookMsg"></div>
    ${c.tickets > 0 ? `<button class="btn-sm" onclick="bookTicket(${c.id})">Confirm Booking</button>` : `<span class="badge">SOLD OUT</span>`}
  `;
  showPage('detail');
}

function bookTicket(id) {
  const c = concerts.find(x => x.id === id);
  if (!c || c.tickets <= 0) return;
  c.tickets--; save();
  document.getElementById('bookMsg').innerHTML = '<p class="ok">✅ Booking successful! Enjoy the concert!</p>';
  document.querySelector('#detailCard .btn-sm') && document.querySelector('#detailCard .btn-sm').remove();
}

function renderAdmin() {
  document.getElementById('adminTable').innerHTML = concerts.map(c => `
    <tr>
      <td>${c.artist}</td><td>${c.date}</td><td>${c.location}</td><td>${c.tickets}</td>
      <td><button onclick="deleteConcert(${c.id})">Delete</button></td>
    </tr>`).join('');
}

function addConcert() {
  const artist = document.getElementById('aArtist').value.trim();
  const date = document.getElementById('aDate').value;
  const location = document.getElementById('aLocation').value.trim();
  const price = +document.getElementById('aPrice').value;
  const tickets = +document.getElementById('aTickets').value;
  const err = document.getElementById('adminErr');
  if (!artist || !date || !location || !price || !tickets) { err.textContent = "All fields required."; return; }
  err.textContent = '';
  concerts.push({ id: Date.now(), artist, date, location, price, tickets }); save();
  ['aArtist','aDate','aLocation','aPrice','aTickets'].forEach(id => document.getElementById(id).value = '');
  renderAdmin();
}

function deleteConcert(id) {
  if (!confirm('Delete this concert?')) return;
  concerts = concerts.filter(x => x.id !== id); save(); renderAdmin();
}

if (currentUser) afterLogin(); else showPage('auth');
</script>
</body>
</html>
