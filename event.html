<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Management System</title>
<style>
*{box-sizing:border-box}
body{
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#667eea,#764ba2);
padding:40px;
margin:0;
}
.container{
max-width:1300px;
margin:auto;
background:#fff;
padding:40px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}
h1,h2{margin-bottom:20px}
.section{margin-bottom:35px}
input,select,textarea{
width:100%;
padding:16px;
margin:10px 0;
font-size:16px;
border:1px solid #ccc;
border-radius:10px;
}
textarea{min-height:120px}
button{
padding:14px 24px;
font-size:16px;
background:#667eea;
color:#fff;
border:none;
border-radius:10px;
cursor:pointer;
}
button:hover{opacity:.9}
.card{
padding:25px;
border-radius:15px;
background:#fafafa;
border:1px solid #ddd;
box-shadow:0 4px 10px rgba(0,0,0,.08);
}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
gap:20px;
}
.hidden{display:none}
</style>
</head>
<body>
<div class="container">
<h1>Event Management System</h1>

<div id="authSection" class="section">
<h2>Register</h2>
<input id="regUser" placeholder="Username">
<input id="regPass" type="password" placeholder="Password">
<select id="regRole">
<option value="user">User</option>
<option value="admin">Admin</option>
</select>
<button onclick="register()">Register</button>

<h2 style="margin-top:30px">Login</h2>
<input id="loginUser" placeholder="Username">
<input id="loginPass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div id="appSection" class="hidden">
<h2 id="welcome"></h2>
<button onclick="logout()">Logout</button>

<div id="adminPanel" class="section hidden">
<h2>Create Event</h2>
<input id="eventName" placeholder="Event Name">
<input id="eventDate" type="date">
<input id="eventLocation" placeholder="Location">
<textarea id="eventDesc" placeholder="Description"></textarea>
<button onclick="createEvent()">Create Event</button>
</div>

<div class="section">
<h2>Available Events</h2>
<div id="events" class="grid"></div>
</div>

<div class="section">
<h2>My Registrations</h2>
<div id="registrations" class="grid"></div>
</div>
</div>
</div>

<script>
let users=JSON.parse(localStorage.getItem("users"))||[];
let events=JSON.parse(localStorage.getItem("events"))||[];
let registrations=JSON.parse(localStorage.getItem("registrations"))||[];
let currentUser=JSON.parse(localStorage.getItem("currentUser"))||null;

function save(){
localStorage.setItem("users",JSON.stringify(users));
localStorage.setItem("events",JSON.stringify(events));
localStorage.setItem("registrations",JSON.stringify(registrations));
}

function register(){
const u=regUser.value,p=regPass.value,r=regRole.value;
if(!u||!p) return alert("Fill all fields");
users.push({username:u,password:p,role:r});
save();
alert("Registered Successfully");
}

function login(){
const user=users.find(x=>x.username===loginUser.value && x.password===loginPass.value);
if(!user) return alert("Invalid credentials");
currentUser=user;
localStorage.setItem("currentUser",JSON.stringify(user));
showApp();
}

function logout(){
localStorage.removeItem("currentUser");
location.reload();
}

function showApp(){
authSection.classList.add("hidden");
appSection.classList.remove("hidden");
welcome.innerText=`Welcome ${currentUser.username} (${currentUser.role})`;
if(currentUser.role==="admin") adminPanel.classList.remove("hidden");
renderEvents();
renderRegistrations();
}

function createEvent(){
events.push({
id:Date.now(),
name:eventName.value,
date:eventDate.value,
location:eventLocation.value,
description:eventDesc.value
});
save();
renderEvents();
}

function registerEvent(id){
registrations.push({user:currentUser.username,eventId:id});
save();
renderRegistrations();
}

function renderEvents(){
events.innerHTML="";
window.events.forEach(e=>{
document.getElementById("events").innerHTML+=`
<div class="card">
<h3>${e.name}</h3>
<p>${e.description}</p>
<p>📅 ${e.date}</p>
<p>📍 ${e.location}</p><br>
<button onclick="registerEvent(${e.id})">Register</button>
</div>`;
});
}

function renderRegistrations(){
const div=document.getElementById("registrations");
div.innerHTML="";
registrations.filter(r=>r.user===currentUser.username).forEach(r=>{
const e=window.events.find(x=>x.id===r.eventId);
if(e){
div.innerHTML+=`
<div class="card">
<h3>${e.name}</h3>
<p>📅 ${e.date}</p><br>
<button>Registered</button>
</div>`;
}
});
}

if(currentUser) showApp();
</script>
</body>
</html>
